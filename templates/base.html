<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Inventory App{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-slate-950 text-slate-100">
    <nav class="sticky top-0 z-50 border-b border-slate-800 bg-slate-900/90 backdrop-blur">
        <div class="mx-auto flex max-w-6xl items-center justify-between px-6 py-5">

            <a href="{% url 'home' %}" class="text-xl font-bold tracking-tight text-white">
                Inventory<span class="text-blue-400">App</span>
            </a>

            <div class="flex items-center gap-6 text-sm font-medium">
                {% if user.is_authenticated %}
                    <a href="{% url 'inventory_list' %}"
                    class="text-slate-300 transition hover:text-white">
                        Inventory
                    </a>

                    <a href="{% url 'inventory_create' %}"
                    class="text-slate-300 transition hover:text-white">
                        Add Item
                    </a>

                    <form method="post" action="{% url 'logout' %}">
                        {% csrf_token %}
                        <button type="submit"
                                class="rounded-xl bg-red-500 px-5 py-2.5 font-semibold text-white transition hover:bg-red-600">
                            Logout
                        </button>
                    </form>
                {% else %}
                    <a href="{% url 'login' %}"
                    class="text-slate-300 transition hover:text-white">
                        Login
                    </a>

                    <a href="{% url 'signup' %}"
                    class="rounded-xl bg-blue-500 px-5 py-2.5 font-semibold text-white transition hover:bg-blue-600">
                        Create User
                    </a>
                {% endif %}
            </div>

        </div>
    </nav>

    <main class="mx-auto max-w-6xl px-6 py-10">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
