{% extends "base.html" %}

{% block title %}Delete Item{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center">

    <div class="w-full max-w-lg bg-slate-900 border border-red-500/30 rounded-3xl p-10 shadow-2xl">

        <div class="mb-6 flex justify-center">
            <div class="h-16 w-16 rounded-full bg-red-500/10 flex items-center justify-center">
                <span class="text-3xl text-red-400">⚠</span>
            </div>
        </div>

        <h1 class="text-3xl font-bold text-red-400 text-center">
            Delete Item
        </h1>

        <p class="mt-4 text-slate-400 text-center">
            You are about to permanently delete this item.
        </p>

        <div class="mt-6 rounded-xl bg-slate-800 p-4 text-center">
            <p class="text-sm uppercase tracking-wider text-slate-500">
                Item
            </p>

            <p class="mt-1 text-xl font-semibold text-white">
                {{ item.item_name }}
            </p>
        </div>

        <div class="mt-8 flex justify-center gap-4">

            <form method="post">
                {% csrf_token %}
                <button class="w-32 h-14 bg-red-500 hover:bg-red-600 px-8 py-3 rounded-xl font-semibold text-white">
                    Delete
                </button>
            </form>

            <a href="{% url 'inventory_list' %}"
               class="w-32 h-14 flex items-center justify-center rounded-xl bg-slate-800 px-8 py-3 font-semibold text-slate-200 transition hover:bg-slate-700">
                Cancel
            </a>

        </div>

    </div>

</div>
{% endblock %}
