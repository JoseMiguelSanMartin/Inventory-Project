<tr>
    <td class="px-4 py-4 font-semibold text-white">
        {{ item.item_name }}
    </td>

<td class="px-4 py-4 text-slate-300">
    {{ item.quantity_required }}
</td>

<td class="px-4 py-4 text-slate-300">
    {{ item.quantity_have }}
</td>

<td class="px-4 py-4 text-slate-300">
    {{ item.quantity_needed }}
</td>

<td class="px-4 py-4">
    {% if item.quantity_have == 0 %}
        <span class="rounded-full bg-red-500/10 px-3 py-1 text-sm font-semibold text-red-300">
            Out of Stock
        </span>
    {% elif item.quantity_needed > 0 %}
        <span class="rounded-full bg-orange-500/10 px-3 py-1 text-sm font-semibold text-orange-300">
            Low Stock
        </span>
    {% else %}
        <span class="rounded-full bg-green-500/10 px-3 py-1 text-sm font-semibold text-green-300">
            Complete
        </span>
    {% endif %}
</td>

</tr>
